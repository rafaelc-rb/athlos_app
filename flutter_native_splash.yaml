flutter_native_splash:
  # Athlos purple background
  color: "#6917B5"
  image: assets/splash_logo.png
  android_gravity: center
  ios_content_mode: center

  # Dark mode uses same purple
  color_dark: "#6917B5"
  image_dark: assets/splash_logo_dark.png

  # Android 12+ splash
  android_12:
    color: "#6917B5"
    color_dark: "#6917B5"
    icon_background_color: "#6917B5"
    icon_background_color_dark: "#6917B5"
    image: assets/splash_logo.png
    image_dark: assets/splash_logo_dark.png
